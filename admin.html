\<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>FinderSeek — Admin</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,600;0,700;1,600&family=Karla:wght@400;600;700;800&family=DM+Mono:wght@400;500&family=Bangers&display=swap" rel="stylesheet"/>
<style>
:root{
  --ink:#06050a;--gold:#c9890c;--gold2:#e8a820;--cream:#f5ead8;
  --dim:#c8b48a;--muted:#8a7a5a;--green:#22c55e;
  --card:rgba(12,10,18,.92);--border:rgba(201,137,12,.2);
  --red:#ef4444;--amber:#f59e0b;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{background:var(--ink);color:var(--cream);font-family:'Karla',sans-serif;min-height:100vh;overflow-x:hidden;}
body::after{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
  background:url('pirate sherlock trans.png') center top/cover no-repeat;opacity:.07;}
body::before{content:'';position:fixed;inset:0;z-index:1;pointer-events:none;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
  background-size:180px;opacity:.5;}

/* NAV */
nav{position:sticky;top:0;z-index:100;display:flex;align-items:center;justify-content:space-between;
  padding:14px 28px;background:rgba(6,5,10,.9);backdrop-filter:blur(16px);
  border-bottom:1px solid rgba(201,137,12,.15);}
.nav-logo{display:flex;align-items:center;gap:10px;text-decoration:none;}
.nav-icon{width:34px;height:34px;border-radius:9px;background:var(--gold);display:flex;align-items:center;justify-content:center;font-size:16px;}
.nav-brand{font-size:16px;font-weight:800;color:var(--cream);}
.nav-brand em{font-style:italic;color:var(--gold);font-family:'Cormorant Garamond',serif;font-size:18px;}
.nav-badge{background:rgba(239,68,68,.15);border:1px solid rgba(239,68,68,.35);border-radius:20px;
  padding:4px 12px;font-size:10px;font-weight:700;color:#fca5a5;font-family:'DM Mono',monospace;letter-spacing:1px;}
.nav-right{display:flex;align-items:center;gap:12px;}
#admin-status{font-size:11px;color:var(--muted);font-family:'DM Mono',monospace;}

/* LOGIN GATE */
.login-gate{position:fixed;inset:0;z-index:200;background:rgba(6,5,10,.97);display:flex;align-items:center;justify-content:center;padding:20px;}
.login-box{background:linear-gradient(160deg,rgba(20,16,30,.99),rgba(10,8,16,.99));border:1px solid var(--border);border-radius:24px;padding:40px 36px;max-width:380px;width:100%;}
.login-title{font-family:'Bangers',cursive;font-size:38px;letter-spacing:3px;margin-bottom:6px;color:var(--cream);}
.login-title em{color:var(--gold);font-style:normal;}
.login-sub{font-size:13px;color:var(--muted);margin-bottom:28px;font-family:'DM Mono',monospace;}
.login-label{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--dim);font-family:'DM Mono',monospace;margin-bottom:6px;display:block;}
.login-input{width:100%;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:10px;padding:12px 14px;font-size:14px;color:var(--cream);font-family:'Karla',sans-serif;outline:none;transition:border-color .2s;margin-bottom:14px;}
.login-input:focus{border-color:rgba(201,137,12,.5);}
.login-input::placeholder{color:var(--muted);}
.btn-login{width:100%;background:linear-gradient(135deg,#b45309,var(--gold2));color:#0a0800;border:none;border-radius:12px;padding:14px;font-size:15px;font-weight:800;cursor:pointer;font-family:'Karla',sans-serif;box-shadow:0 4px 20px rgba(201,137,12,.4);transition:all .2s;}
.btn-login:hover{transform:translateY(-2px);box-shadow:0 8px 32px rgba(201,137,12,.55);}
.login-err{font-size:12px;color:#fca5a5;font-family:'DM Mono',monospace;margin-top:10px;display:none;}
.login-err.show{display:block;}

/* MAIN LAYOUT */
.wrap{position:relative;z-index:2;max-width:1100px;margin:0 auto;padding:32px 24px 80px;}

/* STATS ROW */
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:32px;}
.stat-card{background:var(--card);border:1px solid rgba(255,255,255,.07);border-radius:16px;padding:18px 20px;}
.stat-val{font-family:'Bangers',cursive;font-size:36px;letter-spacing:2px;line-height:1;margin-bottom:4px;}
.stat-lbl{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);font-family:'DM Mono',monospace;}
.stat-pending .stat-val{color:#fbbf24;}
.stat-active .stat-val{color:#4ade80;}
.stat-done .stat-val{color:#94a3b8;}
.stat-rejected .stat-val{color:#f87171;}

/* TABS */
.admin-tabs{display:flex;gap:8px;margin-bottom:24px;border-bottom:1px solid rgba(255,255,255,.07);padding-bottom:0;}
.atab{padding:10px 20px;font-size:13px;font-weight:700;cursor:pointer;color:var(--muted);border-bottom:2px solid transparent;transition:all .2s;font-family:'Karla',sans-serif;letter-spacing:.5px;margin-bottom:-1px;}
.atab.active{color:var(--gold);border-color:var(--gold);}
.atab:hover:not(.active){color:var(--dim);}
.atab-count{display:inline-block;background:rgba(255,255,255,.08);border-radius:10px;padding:1px 7px;font-size:10px;margin-left:6px;font-family:'DM Mono',monospace;}
.atab.active .atab-count{background:rgba(201,137,12,.2);color:var(--gold);}

/* HUNT REVIEW CARDS */
.review-grid{display:grid;gap:16px;}
.rcard{background:var(--card);border:1px solid rgba(255,255,255,.07);border-radius:20px;overflow:hidden;transition:border-color .2s;}
.rcard:hover{border-color:rgba(201,137,12,.2);}
.rcard-top{display:grid;grid-template-columns:200px 1fr;gap:0;}
.rcard-photo{width:200px;height:200px;object-fit:cover;display:block;background:rgba(255,255,255,.04);}
.rcard-photo-empty{width:200px;height:200px;background:rgba(255,255,255,.03);display:flex;align-items:center;justify-content:center;font-size:40px;color:var(--muted);flex-direction:column;gap:8px;}
.rcard-photo-empty span{font-size:11px;font-family:'DM Mono',monospace;color:var(--muted);}
.rcard-info{padding:20px 24px;display:flex;flex-direction:column;justify-content:space-between;}
.rcard-header{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:14px;}
.rcard-title{font-family:'Bangers',cursive;font-size:28px;letter-spacing:2px;color:var(--cream);line-height:1;}
.rcard-prize{font-family:'Bangers',cursive;font-size:22px;letter-spacing:2px;color:#4ade80;}
.status-pill{border-radius:20px;padding:4px 12px;font-size:10px;font-weight:700;font-family:'DM Mono',monospace;letter-spacing:1px;text-transform:uppercase;white-space:nowrap;}
.sp-draft{background:rgba(251,191,36,.12);border:1px solid rgba(251,191,36,.3);color:#fbbf24;}
.sp-active{background:rgba(34,197,94,.12);border:1px solid rgba(34,197,94,.3);color:#4ade80;}
.sp-ended{background:rgba(148,163,184,.08);border:1px solid rgba(148,163,184,.2);color:#94a3b8;}
.sp-cancelled{background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.25);color:#f87171;}
.rcard-meta{display:grid;grid-template-columns:1fr 1fr;gap:8px 16px;margin-bottom:16px;}
.rmeta-item{font-size:12px;}
.rmeta-lbl{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);font-family:'DM Mono',monospace;margin-bottom:2px;}
.rmeta-val{color:var(--cream);font-weight:600;}
.rmeta-val.code{font-family:'DM Mono',monospace;color:#fbbf24;font-size:18px;letter-spacing:3px;}
.rmeta-val.payment{color:#4ade80;}
.rcard-neighborhood{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);border-radius:10px;padding:12px 14px;font-size:12px;color:var(--dim);line-height:1.7;font-style:italic;margin-bottom:16px;}
.rcard-actions{display:flex;gap:10px;align-items:center;}
.btn-approve{background:linear-gradient(135deg,#15803d,#22c55e);color:#0a1a0a;border:none;border-radius:12px;padding:11px 24px;font-size:13px;font-weight:800;cursor:pointer;font-family:'Karla',sans-serif;box-shadow:0 4px 16px rgba(34,197,94,.3);transition:all .2s;letter-spacing:.5px;}
.btn-approve:hover{transform:translateY(-2px);box-shadow:0 8px 28px rgba(34,197,94,.5);}
.btn-reject{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);color:#f87171;border-radius:12px;padding:11px 24px;font-size:13px;font-weight:800;cursor:pointer;font-family:'Karla',sans-serif;transition:all .2s;letter-spacing:.5px;}
.btn-reject:hover{background:rgba(239,68,68,.2);border-color:rgba(239,68,68,.5);}
.btn-view{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);color:var(--dim);border-radius:12px;padding:11px 20px;font-size:13px;font-weight:700;cursor:pointer;font-family:'Karla',sans-serif;transition:all .2s;text-decoration:none;}
.btn-view:hover{border-color:rgba(255,255,255,.2);color:var(--cream);}
.action-note{font-size:11px;color:var(--muted);font-family:'DM Mono',monospace;margin-left:4px;}

/* PHOTO LIGHTBOX */
.lightbox{display:none;position:fixed;inset:0;z-index:500;background:rgba(0,0,0,.92);align-items:center;justify-content:center;padding:20px;}
.lightbox.show{display:flex;}
.lightbox img{max-width:90vw;max-height:90vh;border-radius:12px;object-fit:contain;}
.lightbox-close{position:absolute;top:20px;right:24px;background:none;border:none;color:var(--cream);font-size:28px;cursor:pointer;opacity:.7;}
.lightbox-close:hover{opacity:1;}

/* EMPTY / LOADING */
.empty-state{text-align:center;padding:60px 20px;color:var(--muted);}
.empty-icon{font-size:48px;margin-bottom:16px;}
.empty-msg{font-size:14px;font-family:'DM Mono',monospace;line-height:1.8;}
.loading-pulse{animation:pulse 1.5s ease-in-out infinite;}
@keyframes pulse{0%,100%{opacity:.4}50%{opacity:1}}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.fade-in{animation:fadeUp .35s both;}

/* TOAST */
.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%);background:rgba(20,16,30,.97);border:1px solid var(--border);border-radius:14px;padding:12px 24px;font-size:13px;font-family:'DM Mono',monospace;color:var(--cream);z-index:600;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap;}
.toast.show{opacity:1;}
.toast.success{border-color:rgba(34,197,94,.4);color:#4ade80;}
.toast.error{border-color:rgba(239,68,68,.4);color:#fca5a5;}

@media(max-width:600px){
  .rcard-top{grid-template-columns:1fr;}
  .rcard-photo,.rcard-photo-empty{width:100%;height:180px;}
  .stats-row{grid-template-columns:1fr 1fr;}
}
</style>
</head>
<body>

<!-- LOGIN GATE -->
<div class="login-gate" id="login-gate">
  <div class="login-box">
    <div class="login-title">ADMIN <em>Panel</em></div>
    <div class="login-sub">FinderSeek internal review dashboard</div>
    <label class="login-label">Password</label>
    <input class="login-input" id="admin-pass" type="password" placeholder="Enter admin password" onkeydown="if(e.key==='Enter'||event.key==='Enter')checkLogin()"/>
    <button class="btn-login" onclick="checkLogin()">Enter Dashboard →</button>
    <div class="login-err" id="login-err">Incorrect password. Try again.</div>
  </div>
</div>

<nav>
  <a class="nav-logo" href="#">
    <div class="nav-icon">🔍</div>
    <div><div class="nav-brand">Finder<em>Seek</em></div></div>
  </a>
  <div class="nav-right">
    <div class="nav-badge">⚙️ ADMIN</div>
    <div id="admin-status">Loading…</div>
  </div>
</nav>

<div class="wrap">

  <!-- STATS -->
  <div class="stats-row">
    <div class="stat-card stat-pending"><div class="stat-val" id="s-pending">—</div><div class="stat-lbl">Pending Review</div></div>
    <div class="stat-card stat-active"><div class="stat-val" id="s-active">—</div><div class="stat-lbl">Active Hunts</div></div>
    <div class="stat-card stat-done"><div class="stat-val" id="s-ended">—</div><div class="stat-lbl">Completed</div></div>
    <div class="stat-card stat-rejected"><div class="stat-val" id="s-cancelled">—</div><div class="stat-lbl">Rejected</div></div>
  </div>

  <!-- TABS -->
  <div class="admin-tabs">
    <div class="atab active" onclick="switchTab('draft',this)">🕐 Pending Review <span class="atab-count" id="tc-draft">—</span></div>
    <div class="atab" onclick="switchTab('active',this)">✅ Active <span class="atab-count" id="tc-active">—</span></div>
    <div class="atab" onclick="switchTab('ended',this)">🏁 Completed <span class="atab-count" id="tc-ended">—</span></div>
    <div class="atab" onclick="switchTab('cancelled',this)">❌ Rejected <span class="atab-count" id="tc-cancelled">—</span></div>
  </div>

  <div class="review-grid" id="review-grid">
    <div class="empty-state loading-pulse"><div class="empty-icon">⏳</div><div class="empty-msg">Loading hunts…</div></div>
  </div>

</div>

<!-- PHOTO LIGHTBOX -->
<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <button class="lightbox-close" onclick="closeLightbox()">×</button>
  <img id="lightbox-img" src="" alt="Hunt photo"/>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
const SB  = 'https://qeiuycuasjkopxfkmggp.supabase.co';
const KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFlaXV5Y3Vhc2prb3B4ZmttZ2dwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI4NDAwNDYsImV4cCI6MjA4ODQxNjA0Nn0.cSNiP5p9e3IFGJ1tQY2AWHVt8YKznbji4ku9Sab1tQk';
const H   = { 'apikey': KEY, 'Authorization': 'Bearer ' + KEY, 'Content-Type': 'application/json' };

// ── ADMIN PASSWORD ────────────────────────────────────
const ADMIN_PASS = 'finderseek2026'; // Change this!

function checkLogin() {
  const val = document.getElementById('admin-pass').value;
  if (val === ADMIN_PASS) {
    document.getElementById('login-gate').style.display = 'none';
    localStorage.setItem('fs_admin', '1');
    loadAll();
  } else {
    document.getElementById('login-err').classList.add('show');
    document.getElementById('admin-pass').value = '';
  }
}

window.addEventListener('load', () => {
  if (localStorage.getItem('fs_admin') === '1') {
    document.getElementById('login-gate').style.display = 'none';
    loadAll();
  }
});

// ── DATA ──────────────────────────────────────────────
let allHunts = {}, currentTab = 'draft';

async function loadAll() {
  document.getElementById('admin-status').textContent = 'Syncing…';
  try {
    const r = await fetch(`${SB}/rest/v1/hunts?select=*&order=created_at.desc`, { headers: H });
    const hunts = await r.json();
    if (!Array.isArray(hunts)) throw new Error('Bad response');

    allHunts = { draft:[], active:[], ended:[], cancelled:[] };
    hunts.forEach(h => { if (allHunts[h.status]) allHunts[h.status].push(h); });

    // Update stats
    document.getElementById('s-pending').textContent   = allHunts.draft.length;
    document.getElementById('s-active').textContent    = allHunts.active.length;
    document.getElementById('s-ended').textContent     = allHunts.ended.length;
    document.getElementById('s-cancelled').textContent = allHunts.cancelled.length;

    // Update tab counts
    ['draft','active','ended','cancelled'].forEach(s => {
      document.getElementById('tc-'+s).textContent = allHunts[s].length;
    });

    document.getElementById('admin-status').textContent = `Last synced ${new Date().toLocaleTimeString()}`;
    renderTab(currentTab);
  } catch(e) {
    document.getElementById('admin-status').textContent = 'Error loading';
    showToast('Failed to load hunts: ' + e.message, 'error');
  }
}

// ── TABS ──────────────────────────────────────────────
function switchTab(tab, el) {
  currentTab = tab;
  document.querySelectorAll('.atab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  renderTab(tab);
}

function renderTab(tab) {
  const hunts = allHunts[tab] || [];
  const grid = document.getElementById('review-grid');
  if (!hunts.length) {
    const msgs = { draft:'No hunts pending review', active:'No active hunts', ended:'No completed hunts', cancelled:'No rejected hunts' };
    const icons = { draft:'🕐', active:'✅', ended:'🏁', cancelled:'❌' };
    grid.innerHTML = `<div class="empty-state"><div class="empty-icon">${icons[tab]}</div><div class="empty-msg">${msgs[tab]}</div></div>`;
    return;
  }
  grid.innerHTML = hunts.map((h, i) => buildCard(h, i)).join('');
}

function buildCard(h, i) {
  const photo = h.photo_url
    ? `<img class="rcard-photo" src="${h.photo_url}" alt="Hunt photo" onclick="openLightbox('${h.photo_url}')" style="cursor:zoom-in;" title="Click to enlarge"/>`
    : `<div class="rcard-photo-empty">📷<span>No photo</span></div>`;

  const statusClass = { draft:'sp-draft', active:'sp-active', ended:'sp-ended', cancelled:'sp-cancelled' };
  const statusLabel = { draft:'⏳ Pending', active:'✅ Active', ended:'🏁 Ended', cancelled:'❌ Rejected' };

  const startsAt = h.starts_at ? new Date(h.starts_at).toLocaleString('en-US',{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'}) : '—';
  const endsAt   = h.ends_at   ? new Date(h.ends_at).toLocaleString('en-US',{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'}) : '—';
  const createdAt = h.created_at ? new Date(h.created_at).toLocaleString('en-US',{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'}) : '—';

  const payIcon = h.payment_type === 'zelle' ? '💚' : h.payment_type === 'venmo' ? '💙' : h.payment_type === 'cash' ? '💵' : '💳';

  const actions = h.status === 'draft' ? `
    <button class="btn-approve" onclick="approveHunt('${h.id}')">✅ Approve & Go Live</button>
    <button class="btn-reject"  onclick="rejectHunt('${h.id}')">❌ Reject</button>
    <a class="btn-view" href="hunt.html?id=${h.id}" target="_blank">👁 Preview</a>
  ` : h.status === 'active' ? `
    <button class="btn-reject" onclick="rejectHunt('${h.id}')">⏸ Deactivate</button>
    <a class="btn-view" href="hunt.html?id=${h.id}" target="_blank">👁 View Live</a>
  ` : `
    <a class="btn-view" href="hunt.html?id=${h.id}" target="_blank">👁 View Hunt</a>
  `;

  return `<div class="rcard fade-in" style="animation-delay:${i*.05}s;" id="rcard-${h.id}">
    <div class="rcard-top">
      ${photo}
      <div class="rcard-info">
        <div>
          <div class="rcard-header">
            <div>
              <div class="rcard-title">${h.city || 'Unknown City'}</div>
              <div class="rcard-prize">${h.prize_desc || '—'}</div>
            </div>
            <div class="status-pill ${statusClass[h.status]}">${statusLabel[h.status]}</div>
          </div>
          <div class="rcard-meta">
            <div class="rmeta-item"><div class="rmeta-lbl">Submitted</div><div class="rmeta-val">${createdAt}</div></div>
            <div class="rmeta-item"><div class="rmeta-lbl">Goes Live</div><div class="rmeta-val">${startsAt}</div></div>
            <div class="rmeta-item"><div class="rmeta-lbl">Ends</div><div class="rmeta-val">${endsAt}</div></div>
            <div class="rmeta-item"><div class="rmeta-lbl">Payment</div><div class="rmeta-val payment">${payIcon} ${h.payment_type || '—'} ${h.payment_handle ? '· @'+h.payment_handle : ''}</div></div>
            <div class="rmeta-item"><div class="rmeta-lbl">Finder Code</div><div class="rmeta-val code">${h.finder_code || '——'}</div></div>
            <div class="rmeta-item"><div class="rmeta-lbl">Hunt ID</div><div class="rmeta-val" style="font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);">${h.id.slice(0,8)}…</div></div>
          </div>
          ${h.neighborhood ? `<div class="rcard-neighborhood">"${h.neighborhood}"</div>` : ''}
        </div>
        <div class="rcard-actions">${actions}</div>
      </div>
    </div>
  </div>`;
}

// ── ACTIONS ───────────────────────────────────────────
async function approveHunt(id) {
  if (!confirm('Approve this hunt and make it go live?')) return;
  try {
    const r = await fetch(`${SB}/rest/v1/hunts?id=eq.${id}`, {
      method: 'PATCH',
      headers: { ...H, 'Prefer': 'return=minimal' },
      body: JSON.stringify({ status: 'active' })
    });
    if (!r.ok) throw new Error('Update failed');
    showToast('✅ Hunt approved and live!', 'success');
    await loadAll();
  } catch(e) { showToast('Error: ' + e.message, 'error'); }
}

async function rejectHunt(id) {
  const reason = prompt('Reason for rejection (optional):');
  if (reason === null) return; // cancelled
  try {
    const r = await fetch(`${SB}/rest/v1/hunts?id=eq.${id}`, {
      method: 'PATCH',
      headers: { ...H, 'Prefer': 'return=minimal' },
      body: JSON.stringify({ status: 'cancelled' })
    });
    if (!r.ok) throw new Error('Update failed');
    showToast('❌ Hunt rejected.', 'error');
    await loadAll();
  } catch(e) { showToast('Error: ' + e.message, 'error'); }
}

// ── LIGHTBOX ──────────────────────────────────────────
function openLightbox(url) {
  document.getElementById('lightbox-img').src = url;
  document.getElementById('lightbox').classList.add('show');
}
function closeLightbox() {
  document.getElementById('lightbox').classList.remove('show');
}
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeLightbox(); });

// ── TOAST ─────────────────────────────────────────────
function showToast(msg, type='') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show ' + type;
  setTimeout(() => t.classList.remove('show'), 3000);
}

// ── AUTO REFRESH ──────────────────────────────────────
setInterval(() => {
  if (localStorage.getItem('fs_admin') === '1') loadAll();
}, 30000); // refresh every 30s
</script>
