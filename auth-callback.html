<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"/>
<title>FinderSeek — Sign-in Diagnostic</title>
<meta name="theme-color" content="#0a0810"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#0a0810;color:#f5ead8;font-family:-apple-system,system-ui,sans-serif;min-height:100vh;padding:20px;font-size:15px;line-height:1.5;}
h1{font-size:20px;color:#f5c842;margin-bottom:4px;}
.note{color:rgba(255,255,255,.45);font-size:13px;margin-bottom:18px;}
.row{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:10px;padding:12px 14px;margin-bottom:10px;word-break:break-all;}
.label{color:rgba(255,255,255,.5);font-size:12px;text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px;}
.val{color:#fff;font-family:ui-monospace,Menlo,monospace;font-size:13px;}
.ok{color:#4ade80;font-weight:600;}
.bad{color:#f87171;font-weight:600;}
.btn{display:block;width:100%;padding:15px;border-radius:30px;border:none;background:linear-gradient(135deg,#c9890c,#e8a820);color:#0a0800;font-size:17px;font-weight:600;margin-top:16px;text-decoration:none;text-align:center;}
</style>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
</head>
<body>
<h1>Sign-in Diagnostic</h1>
<div class="note">Temporary page. Screenshot this whole screen and send it back. (Swap your normal auth-callback.html back after.)</div>
<div id="out"><div class="row"><div class="val">Running checks…</div></div></div>
<a href="index.html" class="btn">Continue to app &rarr;</a>
<script>
var SB = 'https://qeiuycuasjkopxfkmggp.supabase.co';
var KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFlaXV5Y3Vhc2prb3B4ZmttZ2dwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI4NDAwNDYsImV4cCI6MjA4ODQxNjA0Nn0.cSNiP5p9e3IFGJ1tQY2AWHVt8YKznbji4ku9Sab1tQk';
function esc(s){ return String(s).replace(/[&<>]/g, function(c){ return {'&':'&amp;','<':'&lt;','>':'&gt;'}[c]; }); }
function row(label, val, cls){ return '<div class="row"><div class="label">'+label+'</div><div class="val '+(cls||'')+'">'+esc(val)+'</div></div>'; }
(async function(){
  var out = '';
  var loc = window.location;
  var hash = new URLSearchParams(loc.hash.substring(1));
  var query = new URLSearchParams(loc.search);
  out += row('Origin (domain)', loc.origin, loc.origin.indexOf('www') > -1 ? '' : 'ok');
  var ver = (window.supabase && window.supabase.createClient) ? 'loaded' : 'NOT LOADED';
  out += row('Supabase library', ver, ver === 'loaded' ? 'ok' : 'bad');
  var accessToken = hash.get('access_token') || query.get('access_token');
  var code = query.get('code');
  var err = hash.get('error') || query.get('error');
  var errDesc = hash.get('error_description') || query.get('error_description');
  out += row('access_token in URL (implicit)', accessToken ? 'YES' : 'no', accessToken ? 'ok' : '');
  out += row('code in URL (pkce)', code ? 'YES' : 'no', code ? 'ok' : '');
  if (err) out += row('PROVIDER ERROR', err + (errDesc ? ' — ' + decodeURIComponent(errDesc) : ''), 'bad');
  var sessionStatus = '(skipped)';
  var sessionEmail = '';
  try {
    var supaClient = window.supabase.createClient(SB, KEY);
    var res = await supaClient.auth.getSession();
    if (res.data && res.data.session) {
      sessionStatus = 'SESSION CREATED';
      sessionEmail = (res.data.session.user && res.data.session.user.email) || '(no email)';
    } else if (code) {
      try {
        var ex = await supaClient.auth.exchangeCodeForSession(code);
        if (ex.data && ex.data.session) {
          sessionStatus = 'SESSION via code exchange';
          sessionEmail = (ex.data.session.user && ex.data.session.user.email) || '(no email)';
        } else { sessionStatus = 'NO SESSION (exchange empty)'; }
      } catch(e2) { sessionStatus = 'EXCHANGE FAILED: ' + (e2.message || e2); }
    } else { sessionStatus = 'NO SESSION'; }
  } catch(e) { sessionStatus = 'getSession threw: ' + (e.message || e); }
  out += row('Session result', sessionStatus, sessionStatus.indexOf('SESSION') > -1 ? 'ok' : 'bad');
  if (sessionEmail) out += row('Signed in as', sessionEmail, 'ok');
  var sbKey = 'none', fsTok = 'none', magic='none';
  try {
    var keys = Object.keys(localStorage);
    for (var i=0;i<keys.length;i++){ if (keys[i].indexOf('sb-')===0 && keys[i].indexOf('-auth-token')>0) sbKey = keys[i]; }
    fsTok = localStorage.getItem('fs_token') ? 'present' : 'none';
    magic = localStorage.getItem('fs_magic_return') || 'none';
  } catch(e){ sbKey = 'localStorage blocked: ' + (e.message||e); }
  out += row('Supabase session key in storage', sbKey, sbKey === 'none' ? 'bad' : 'ok');
  out += row('fs_token in storage', fsTok, '');
  out += row('fs_magic_return', magic, '');
  out += row('Full URL', loc.href, '');
  document.getElementById('out').innerHTML = out;
})();
</script>
</body>
</html>
