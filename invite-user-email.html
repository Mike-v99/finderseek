<!DOCTYPE html>
<html>
<body style="margin:0;padding:0;background:#f5f5f7;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;">
  <table width="100%" cellpadding="0" cellspacing="0" border="0" style="background:#f5f5f7;padding:20px 0;">
    <tr>
      <td align="center">
        <table width="500" cellpadding="0" cellspacing="0" border="0" style="background:#ffffff;border-radius:8px;overflow:hidden;max-width:500px;width:100%;">
          <tr>
            <td align="center" style="padding:44px 32px 32px;">
              <table cellpadding="0" cellspacing="0" border="0" style="margin-bottom:28px;">
                <tr>
                  <td align="center">
                    <table cellpadding="0" cellspacing="0" border="0" style="width:54px;height:54px;background:linear-gradient(135deg,#e8a820,#92400e);border-radius:12px;">
                      <tr><td align="center" style="padding:10px 0 2px;color:#ffffff;font-size:13px;font-weight:400;line-height:1;">Finder</td></tr>
                      <tr><td align="center" style="padding:2px 0 10px;color:#ffffff;font-size:13px;font-weight:200;line-height:1;">Seek</td></tr>
                    </table>
                    <div style="font-size:13px;color:#888888;margin-top:10px;letter-spacing:2px;text-transform:uppercase;">FinderSeek</div>
                  </td>
                </tr>
              </table>
              <h1 style="font-size:26px;font-weight:500;color:#111111;margin:0 0 14px;">You've been invited!</h1>
              <p style="font-size:15px;color:#666666;line-height:1.6;margin:0 0 28px;">Someone invited you to join FinderSeek. Tap below to accept and start hunting for treasure.</p>
              <table cellpadding="0" cellspacing="0" border="0" style="margin:0 auto;">
                <tr>
                  <td align="center" bgcolor="#e8a820" style="border-radius:10px;">
                    <a href="{{ .ConfirmationURL }}" target="_blank" style="display:inline-block;background:#e8a820;color:#ffffff;padding:14px 30px;border-radius:10px;text-decoration:none;font-size:15px;font-weight:500;">Accept Invite →</a>
                  </td>
                </tr>
              </table>
            </td>
          </tr>
          <tr>
            <td align="center" style="font-size:12px;color:#999999;padding:22px 32px;border-top:1px solid #f0f0f0;">Not expecting this? You can safely ignore this email.</td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
