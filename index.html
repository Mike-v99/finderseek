<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<title>FinderSeek — Home</title>
<meta name="theme-color" content="#0d0b18"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Quantico:wght@400;700&family=Abril+Fatface&display=swap" rel="stylesheet"/>
<style>
:root {
  --ink: #0d0b18;
  --cream: #f5ead8;
  --gold: #c9890c;
  --gold2: #e8a820;
  --gold3: #f5c842;
  --dim: #c8b48a;
  --muted: #555;
  --green: #4ade80;
  --green-dark: #22c55e;
  --green-deep: #15803d;
  --teal: #2dd4bf;
  --blue: #3b82f6;
  --blue-light: #60a5fa;
  --blue-pale: #93c5fd;
  --red: #ef4444;
  --red-light: #f87171;
  --yellow: #fbbf24;
  --gray: #94a3b8;
  --gray-dark: #64748b;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { height: 100%; overflow-x: hidden; }
body {
  background: var(--ink);
  color: var(--cream);
  font-family: 'Quantico', sans-serif;
  min-height: 100vh;
  min-height: 100dvh;
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
  position: relative;
}
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background:
    radial-gradient(ellipse at 50% 0%, rgba(201,137,12,.07) 0%, transparent 50%),
    radial-gradient(ellipse at 50% 50%, rgba(6,5,10,.3) 0%, rgba(6,5,10,.92) 70%);
  pointer-events: none;
  z-index: 0;
}
body::after {
  content: '';
  position: fixed;
  inset: 0;
  z-index: 0;
  pointer-events: none;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
  background-size: 180px;
  opacity: .4;
}

.page { position: relative; z-index: 1; max-width: 480px; margin: 0 auto; padding-bottom: 60vh; }

/* HERO */
.hero { text-align: center; padding: 16px 20px 16px; }
.logo {
  font-family: 'Abril Fatface', serif;
  font-size: clamp(48px, 12vw, 58px);
  line-height: 1.1;
  margin-bottom: 10px;
}
.logo-finder {
  background: linear-gradient(90deg, var(--gold2), var(--gold3), var(--gold));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
.logo-seek { color: var(--cream); }
.tagline { font-size: 16px; color: var(--dim); }
.free-badge {
  display: inline-block;
  margin-top: 14px;
  font-size: 16px;
  color: var(--teal);
  letter-spacing: 2px;
  border: 1px solid rgba(45,212,191,.4);
  border-radius: 20px;
  padding: 6px 18px;
  background: rgba(45,212,191,.08);
}

/* CTA BUTTONS */
.cta-row { display: flex; gap: 10px; margin: 24px 0 0; padding: 0 4px; }
.btn-cta {
  flex: 1;
  border-radius: 18px;
  padding: 24px 12px;
  text-align: center;
  cursor: pointer;
  transition: transform .2s, box-shadow .2s;
  text-decoration: none;
  display: block;
}
.btn-cta:active { transform: scale(.97); }
.btn-find {
  border: 2px solid var(--gold2);
  background: linear-gradient(180deg, rgba(232,168,32,.1) 0%, rgba(232,168,32,.02) 100%);
  box-shadow: 0 0 28px rgba(232,168,32,.1);
}
.btn-hide {
  border: 2px solid var(--blue);
  background: linear-gradient(180deg, rgba(59,130,246,.1) 0%, rgba(59,130,246,.02) 100%);
  box-shadow: 0 0 28px rgba(59,130,246,.1);
}
.btn-cta-icon { font-size: 34px; margin-bottom: 10px; display: block; }
.btn-cta-label { font-size: 18px; font-weight: 700; letter-spacing: 2px; }
.btn-find .btn-cta-label { color: var(--yellow); animation: glowPulseG 3s ease-in-out infinite; }
.btn-hide .btn-cta-label { color: #fff; animation: glowPulseB 3s ease-in-out infinite .5s; }
@keyframes glowPulseG { 0%,100% { text-shadow: 0 0 8px rgba(251,191,36,.4); } 50% { text-shadow: 0 0 20px rgba(251,191,36,.8), 0 0 40px rgba(251,191,36,.3); } }
@keyframes glowPulseB { 0%,100% { text-shadow: 0 0 8px rgba(96,165,250,.4); } 50% { text-shadow: 0 0 20px rgba(96,165,250,.8), 0 0 40px rgba(96,165,250,.3); } }

/* STATS STRIP */
.stats-wrap {
  margin-top: 22px;
  padding: 2px;
  border-radius: 16px;
  background: linear-gradient(135deg, var(--gold), var(--gold3), #a8781a, var(--gold2), var(--gold));
}
.stats-inner {
  display: flex;
  background: var(--ink);
  border-radius: 14px;
  overflow: hidden;
}
.stat {
  flex: 1;
  text-align: center;
  padding: 14px 4px;
}
.stat + .stat { border-left: 1px solid rgba(255,255,255,.07); }
.stat-num { font-size: 22px; font-weight: 700; display: block; }
.stat-lbl { font-size: 16px; color: #fff; display: block; margin-top: 2px; }

/* SEARCH */
.search-row { display: flex; gap: 10px; align-items: center; margin: 18px 16px 18px; }
.search-wrap {
  flex: 1;
  position: relative;
  background: rgba(255,255,255,.05);
  border: 1px solid rgba(255,255,255,.1);
  border-radius: 14px;
  overflow: hidden;
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
}
.search-wrap::before {
  content: '';
  position: absolute;
  top: 0;
  left: 15%;
  right: 15%;
  height: 1px;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,.2), transparent);
  pointer-events: none;
}
.search-input {
  width: 100%;
  background: transparent;
  border: none;
  padding: 14px 16px 14px 42px;
  font-size: 16px;
  color: var(--cream);
  outline: none;
  font-family: 'Quantico', sans-serif;
  -webkit-appearance: none;
}
.search-input::placeholder { color: rgba(255,255,255,.3); }
.search-icon { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); font-size: 16px; color: rgba(255,255,255,.3); z-index: 2; pointer-events: none; }
.btn-livemap {
  background: linear-gradient(135deg, #b91c1c, var(--red));
  color: #fff;
  border: none;
  border-radius: 14px;
  padding: 14px 20px;
  font-size: 16px;
  font-weight: 700;
  font-family: 'Quantico', sans-serif;
  display: flex;
  align-items: center;
  gap: 6px;
  cursor: pointer;
  white-space: nowrap;
  box-shadow: 0 4px 16px rgba(239,68,68,.25);
}
.pulse-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: #fff;
  animation: pulse 2s infinite;
}
@keyframes pulse { 0%,100% { opacity:1; transform:scale(1); } 50% { opacity:.5; transform:scale(.85); } }

/* SECTIONS */
.sections { padding: 0 16px; display: flex; flex-direction: column; gap: 8px; }
.section {
  border-radius: 16px;
  overflow: hidden;
  cursor: pointer;
  transition: transform .15s;
}
.section:active { transform: scale(.98); }
.section-active { border: 1.5px solid rgba(34,197,94,.3); }
.section-scheduled { border: 1.5px solid rgba(251,191,36,.2); }
.section-completed { border: 1.5px solid rgba(148,163,184,.15); }
.section-accent {
  height: 2px;
}
.section-active .section-accent { background: linear-gradient(90deg, var(--green-dark), var(--green), transparent); }
.section-scheduled .section-accent { background: linear-gradient(90deg, var(--yellow), #f59e0b, transparent); }
.section-completed .section-accent { background: linear-gradient(90deg, var(--gray), var(--gray-dark), transparent); }
.section-body {
  padding: 14px 16px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.section-left { display: flex; align-items: center; gap: 12px; }
.num-circle {
  width: 40px; height: 40px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  font-weight: 700;
  flex-shrink: 0;
}
.section-active .num-circle {
  border: 2px solid var(--green);
  color: var(--green);
  box-shadow: 0 0 0 4px rgba(74,222,128,.12), 0 0 12px rgba(74,222,128,.2);
}
.section-scheduled .num-circle {
  border: 2px solid var(--yellow);
  color: var(--yellow);
  box-shadow: 0 0 0 4px rgba(251,191,36,.12), 0 0 12px rgba(251,191,36,.2);
}
.section-completed .num-circle {
  border: 2px solid var(--gray);
  color: var(--gray);
  box-shadow: 0 0 0 4px rgba(148,163,184,.08), 0 0 12px rgba(148,163,184,.15);
}
.section-title { font-size: 18px; font-weight: 700; letter-spacing: 2px; }
.section-active .section-title {
  background: linear-gradient(135deg, var(--green), var(--green-dark));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
.section-scheduled .section-title {
  background: linear-gradient(135deg, var(--blue-light), var(--blue-pale));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
.section-completed .section-title { color: var(--red-light); }
.section-prize { font-size: 22px; font-weight: 700; color: var(--green); }
.section-chevron { color: inherit; font-size: 18px; margin-left: 8px; }
.section-active .section-chevron { color: var(--green); }
.section-scheduled .section-chevron { color: var(--yellow); }
.section-completed .section-chevron { color: var(--gray); }

/* BOTTOM NAV */
.bottom-nav {
  position: fixed;
  bottom: 0;
  left: 50%;
  transform: translateX(-50%);
  width: 100%;
  max-width: 480px;
  border-radius: 0;
  background: rgba(16,14,26,.98);
  border-top: 1px solid rgba(255,255,255,.08);
  padding: 10px 4px 12px;
  display: flex;
  align-items: flex-end;
  justify-content: space-around;
  z-index: 50;
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
}
.nav-item {
  text-align: center;
  flex: 1;
  padding: 6px 0;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
}
.nav-item svg { transition: filter .2s; }
.nav-label { font-size: 16px; color: var(--muted); margin-top: 5px; transition: color .2s, text-shadow .2s; }
.nav-item.active svg {
  stroke: #f0f0f0;
  stroke-width: 2.2;
  filter: drop-shadow(0 0 6px rgba(240,240,240,.5)) drop-shadow(0 0 12px rgba(240,240,240,.25));
}
.nav-item.active .nav-label {
  color: #f0f0f0;
  font-weight: 700;
  text-shadow: 0 0 12px rgba(240,240,240,.6), 0 0 24px rgba(240,240,240,.3);
}
.nav-center {
  text-align: center;
  flex: 1;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
}
.nav-orb {
  width: 54px; height: 54px;
  border-radius: 50%;
  background: linear-gradient(135deg, #d4d4d4, #ffffff);
  display: flex;
  align-items: center;
  justify-content: center;
  margin: -26px auto 0;
  box-shadow: 0 4px 20px rgba(255,255,255,.3), 0 0 0 3px rgba(16,14,26,.98);
}
.nav-center .nav-label { color: #e0e0e0; font-weight: 700; }

/* Fly-in animation system */
.el {
  opacity: 0;
  transform: translateY(30px);
  transition: opacity .6s ease-out, transform .6s ease-out;
}
.el.from-left { transform: translateX(-40px) translateY(0); }
.el.from-right { transform: translateX(40px) translateY(0); }
.el.from-scale { transform: scale(.7); }
.el.show { opacity: 1; transform: translateY(0) translateX(0) scale(1); }

/* Gold burst canvas overlay */
.burst-canvas {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  z-index: 200;
  pointer-events: none;
}

/* Safe area padding for notch phones */
@supports (padding-bottom: env(safe-area-inset-bottom)) {
  .bottom-nav { padding-bottom: calc(12px + env(safe-area-inset-bottom)); }
  .page { padding-bottom: calc(100px + env(safe-area-inset-bottom)); }
  .hero { padding-top: calc(16px + env(safe-area-inset-top)); }
}
</style>
</head>
<body>

<canvas class="burst-canvas" id="burstCanvas"></canvas>

<div class="page">

  <!-- HERO -->
  <div class="hero">
    <div class="logo el from-scale" data-d="300">
      <span class="logo-finder">Finder</span><span class="logo-seek">Seek</span>
    </div>
    <div class="tagline el" data-d="600">Hidden Treasure. Real Adventure.</div>
    <div class="el" data-d="750" style="text-align:center;"><span class="free-badge">FREE TO PLAY</span></div>

    <!-- CTA BUTTONS -->
    <div class="cta-row">
      <a class="btn-cta btn-find el from-left" data-d="950" href="#quest-sections" onclick="event.preventDefault();document.getElementById('quest-sections').scrollIntoView({behavior:'smooth',block:'start'});">
        <span class="btn-cta-icon">🔍</span>
        <span class="btn-cta-label">FIND TREASURE</span>
      </a>
      <a class="btn-cta btn-hide el from-right" data-d="950" href="newquest.html">
        <span class="btn-cta-icon">+</span>
        <span class="btn-cta-label">START QUEST</span>
      </a>
    </div>

    <!-- STATS STRIP -->
    <div class="stats-wrap el from-scale" data-d="1150">
      <div class="stats-inner">
        <div class="stat">
          <span class="stat-num" style="color:#4ade80;text-shadow:0 0 12px rgba(74,222,128,.35);">$247</span>
          <span class="stat-lbl">HIDDEN</span>
        </div>
        <div class="stat">
          <span class="stat-num" style="color:#2dd4bf;">3</span>
          <span class="stat-lbl">ACTIVE</span>
        </div>
        <div class="stat">
          <span class="stat-num" style="color:#4ade80;">12</span>
          <span class="stat-lbl">SEEKERS</span>
        </div>
        <div class="stat">
          <span class="stat-num" style="color:#fff;">5</span>
          <span class="stat-lbl">CITIES</span>
        </div>
      </div>
    </div>
  </div>

  <!-- SEARCH -->
  <div class="search-row el from-right" data-d="1350">
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input class="search-input" type="text" placeholder="Search quests..."/>
    </div>
    <button class="btn-livemap"><span class="pulse-dot"></span>LIVE MAP</button>
  </div>

  <!-- QUEST SECTIONS -->
  <div class="sections" id="quest-sections">
    <div class="section section-active el from-left" data-d="1500" onclick="this.classList.toggle('open')">
      <div class="section-accent"></div>
      <div class="section-body">
        <div class="section-left">
          <div class="num-circle">3</div>
          <div class="section-title">ACTIVE</div>
        </div>
        <div style="display:flex;align-items:center;">
          <span class="section-prize">$172</span>
          <span class="section-chevron">▾</span>
        </div>
      </div>
    </div>

    <div class="section section-scheduled el from-right" data-d="1650" onclick="this.classList.toggle('open')">
      <div class="section-accent"></div>
      <div class="section-body">
        <div class="section-left">
          <div class="num-circle">2</div>
          <div class="section-title">SCHEDULED</div>
        </div>
        <div style="display:flex;align-items:center;">
          <span class="section-prize">$75</span>
          <span class="section-chevron">▾</span>
        </div>
      </div>
    </div>

    <div class="section section-completed el from-left" data-d="1800" onclick="this.classList.toggle('open')">
      <div class="section-accent"></div>
      <div class="section-body">
        <div class="section-left">
          <div class="num-circle">8</div>
          <div class="section-title">COMPLETED</div>
        </div>
        <div style="display:flex;align-items:center;">
          <span class="section-prize">$430</span>
          <span class="section-chevron">▾</span>
        </div>
      </div>
    </div>
  </div>

</div>

<!-- BOTTOM NAV -->
<nav class="bottom-nav">
  <div class="nav-item active" onclick="setNav(this)">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
    <div class="nav-label">Home</div>
  </div>
  <div class="nav-item" onclick="setNav(this)">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>
    <div class="nav-label">How</div>
  </div>
  <div class="nav-center" onclick="setNav(this)">
    <div class="nav-orb">
      <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="#1a1a1a" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    </div>
    <div class="nav-label">Quests</div>
  </div>
  <div class="nav-item" onclick="setNav(this)">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="20" height="14" rx="2" ry="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
    <div class="nav-label">Pricing</div>
  </div>
  <div class="nav-item" onclick="setNav(this)">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
    <div class="nav-label">Profile</div>
  </div>
</nav>

<script>
// Nav switching
function setNav(el) {
  document.querySelectorAll('.nav-item, .nav-center').forEach(function(n) {
    n.classList.remove('active');
  });
  el.classList.add('active');
}

// Gold burst animation
function playGoldBurst() {
  var canvas = document.getElementById('burstCanvas');
  canvas.width = window.innerWidth * 2;
  canvas.height = window.innerHeight * 2;
  canvas.style.width = window.innerWidth + 'px';
  canvas.style.height = window.innerHeight + 'px';
  var ctx = canvas.getContext('2d');
  ctx.scale(2, 2);
  var w = window.innerWidth;
  var h = window.innerHeight;
  var cx = w / 2;
  var cy = h * 0.18;
  var start = performance.now();

  function frame(t) {
    var e = (t - start) / 1000;
    ctx.clearRect(0, 0, w, h);
    if (e < 1.6) {
      var r = e < 0.5 ? (e / 0.5) * Math.max(w, h) * 0.8 : Math.max(w, h) * 0.8;
      var alpha = e < 0.25 ? e / 0.25 : Math.max(0, 1 - (e - 0.25) / 1.1);
      var g = ctx.createRadialGradient(cx, cy, 0, cx, cy, r);
      g.addColorStop(0, 'rgba(245,200,66,' + (alpha * 0.5) + ')');
      g.addColorStop(0.3, 'rgba(232,168,32,' + (alpha * 0.25) + ')');
      g.addColorStop(0.6, 'rgba(201,137,12,' + (alpha * 0.08) + ')');
      g.addColorStop(1, 'rgba(201,137,12,0)');
      ctx.fillStyle = g;
      ctx.fillRect(0, 0, w, h);
      // rays
      ctx.save();
      ctx.globalAlpha = alpha * 0.15;
      ctx.translate(cx, cy);
      for (var i = 0; i < 12; i++) {
        ctx.rotate(Math.PI / 6);
        ctx.fillStyle = '#f5c842';
        ctx.fillRect(-1, 0, 2, r * 0.6);
      }
      ctx.restore();
    }
    if (e < 2) requestAnimationFrame(frame);
    else { ctx.clearRect(0, 0, w, h); canvas.style.display = 'none'; }
  }
  canvas.style.display = 'block';
  requestAnimationFrame(frame);
}

// Trigger fly-in elements
function triggerFlyIn() {
  var els = document.querySelectorAll('.el');
  els.forEach(function(el) {
    var delay = parseInt(el.getAttribute('data-d')) || 0;
    setTimeout(function() { el.classList.add('show'); }, delay);
  });
}

// Run on load
window.addEventListener('DOMContentLoaded', function() {
  playGoldBurst();
  triggerFlyIn();
});
</script>

</body>
</html>
