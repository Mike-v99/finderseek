<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<title>FinderSeek — Home</title>
<meta name="theme-color" content="#0d0b18"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Quantico:wght@400;700&family=Abril+Fatface&display=swap" rel="stylesheet"/>
<style>
:root {
  --ink: #0d0b18;
  --cream: #f5ead8;
  --gold: #c9890c;
  --gold2: #e8a820;
  --gold3: #f5c842;
  --dim: #c8b48a;
  --muted: #555;
  --green: #4ade80;
  --green-dark: #22c55e;
  --green-deep: #15803d;
  --teal: #2dd4bf;
  --blue: #3b82f6;
  --blue-light: #60a5fa;
  --blue-pale: #93c5fd;
  --red: #ef4444;
  --red-light: #f87171;
  --yellow: #fbbf24;
  --gray: #94a3b8;
  --gray-dark: #64748b;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { height: 100%; overflow-x: hidden; }
body {
  background: var(--ink);
  color: var(--cream);
  font-family: 'Quantico', sans-serif;
  min-height: 100vh;
  min-height: 100dvh;
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
  position: relative;
}
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background:
    radial-gradient(ellipse at 50% 0%, rgba(201,137,12,.07) 0%, transparent 50%),
    radial-gradient(ellipse at 50% 50%, rgba(6,5,10,.3) 0%, rgba(6,5,10,.92) 70%);
  pointer-events: none;
  z-index: 0;
}
body::after {
  content: '';
  position: fixed;
  inset: 0;
  z-index: 0;
  pointer-events: none;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
  background-size: 180px;
  opacity: .4;
}

.page { position: relative; z-index: 1; max-width: 480px; margin: 0 auto; padding-bottom: 100px; }

/* HERO */
.hero { text-align: center; padding: 48px 20px 16px; }
.logo {
  font-family: 'Abril Fatface', serif;
  font-size: clamp(48px, 12vw, 58px);
  line-height: 1.1;
  margin-bottom: 10px;
}
.logo-finder {
  background: linear-gradient(90deg, var(--gold2), var(--gold3), var(--gold));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
.logo-seek { color: var(--cream); }
.tagline { font-size: 16px; color: var(--dim); }
.free-badge {
  display: inline-block;
  margin-top: 14px;
  font-size: 16px;
  color: var(--teal);
  letter-spacing: 2px;
  border: 1px solid rgba(45,212,191,.4);
  border-radius: 20px;
  padding: 6px 18px;
  background: rgba(45,212,191,.08);
}

/* CTA BUTTONS */
.cta-row { display: flex; gap: 10px; margin: 24px 0 0; padding: 0 4px; }
.btn-cta {
  flex: 1;
  border-radius: 18px;
  padding: 24px 12px;
  text-align: center;
  cursor: pointer;
  transition: transform .2s, box-shadow .2s;
  text-decoration: none;
  display: block;
}
.btn-cta:active { transform: scale(.97); }
.btn-find {
  border: 2px solid var(--gold2);
  background: linear-gradient(180deg, rgba(232,168,32,.1) 0%, rgba(232,168,32,.02) 100%);
  box-shadow: 0 0 28px rgba(232,168,32,.1);
}
.btn-hide {
  border: 2px solid var(--blue);
  background: linear-gradient(180deg, rgba(59,130,246,.1) 0%, rgba(59,130,246,.02) 100%);
  box-shadow: 0 0 28px rgba(59,130,246,.1);
}
.btn-cta-icon { font-size: 34px; margin-bottom: 10px; display: block; }
.btn-cta-label { font-size: 18px; font-weight: 700; letter-spacing: 2px; }
.btn-find .btn-cta-label { color: var(--yellow); }
.btn-hide .btn-cta-label { color: var(--blue-light); }

/* STATS STRIP */
.stats-wrap {
  margin-top: 22px;
  padding: 2px;
  border-radius: 16px;
  background: linear-gradient(135deg, var(--gold), var(--gold3), #a8781a, var(--gold2), var(--gold));
}
.stats-inner {
  display: flex;
  background: var(--ink);
  border-radius: 14px;
  overflow: hidden;
}
.stat {
  flex: 1;
  text-align: center;
  padding: 14px 4px;
}
.stat + .stat { border-left: 1px solid rgba(255,255,255,.07); }
.stat-num { font-size: 22px; font-weight: 700; display: block; }
.stat-lbl { font-size: 16px; color: #fff; display: block; margin-top: 2px; }

/* SEARCH */
.search-row { display: flex; margin: 18px 16px 18px; }
.search-input {
  flex: 1;
  background: rgba(255,255,255,.05);
  border: 1px solid rgba(255,255,255,.1);
  border-radius: 12px 0 0 12px;
  padding: 14px 12px 14px 38px;
  font-size: 16px;
  color: var(--cream);
  outline: none;
  font-family: 'Quantico', sans-serif;
  -webkit-appearance: none;
}
.search-input::placeholder { color: var(--muted); }
.search-wrap { flex: 1; position: relative; }
.search-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); font-size: 16px; color: #8a7a5a; z-index: 2; pointer-events: none; }
.btn-livemap {
  background: linear-gradient(135deg, #b91c1c, var(--red));
  color: #fff;
  border: none;
  border-radius: 0 12px 12px 0;
  padding: 14px 16px;
  font-size: 16px;
  font-weight: 700;
  font-family: 'Quantico', sans-serif;
  display: flex;
  align-items: center;
  gap: 6px;
  cursor: pointer;
  white-space: nowrap;
}
.pulse-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: #fff;
  animation: pulse 2s infinite;
}
@keyframes pulse { 0%,100% { opacity:1; transform:scale(1); } 50% { opacity:.5; transform:scale(.85); } }

/* SECTIONS */
.sections { padding: 0 16px; display: flex; flex-direction: column; gap: 8px; }
.section {
  border-radius: 16px;
  overflow: hidden;
  cursor: pointer;
  transition: transform .15s;
}
.section:active { transform: scale(.98); }
.section-active { border: 1.5px solid rgba(34,197,94,.3); }
.section-scheduled { border: 1.5px solid rgba(251,191,36,.2); }
.section-completed { border: 1.5px solid rgba(148,163,184,.15); }
.section-accent {
  height: 2px;
}
.section-active .section-accent { background: linear-gradient(90deg, var(--green-dark), var(--green), transparent); }
.section-scheduled .section-accent { background: linear-gradient(90deg, var(--yellow), #f59e0b, transparent); }
.section-completed .section-accent { background: linear-gradient(90deg, var(--gray), var(--gray-dark), transparent); }
.section-body {
  padding: 14px 16px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.section-left { display: flex; align-items: center; gap: 12px; }
.num-circle {
  width: 40px; height: 40px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  font-weight: 700;
  flex-shrink: 0;
}
.section-active .num-circle {
  border: 2px solid var(--green);
  color: var(--green);
  box-shadow: 0 0 0 4px rgba(74,222,128,.12), 0 0 12px rgba(74,222,128,.2);
}
.section-scheduled .num-circle {
  border: 2px solid var(--yellow);
  color: var(--yellow);
  box-shadow: 0 0 0 4px rgba(251,191,36,.12), 0 0 12px rgba(251,191,36,.2);
}
.section-completed .num-circle {
  border: 2px solid var(--gray);
  color: var(--gray);
  box-shadow: 0 0 0 4px rgba(148,163,184,.08), 0 0 12px rgba(148,163,184,.15);
}
.section-title { font-size: 18px; font-weight: 700; letter-spacing: 2px; }
.section-active .section-title {
  background: linear-gradient(135deg, var(--green), var(--green-dark));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
.section-scheduled .section-title {
  background: linear-gradient(135deg, var(--blue-light), var(--blue-pale));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
.section-completed .section-title { color: var(--red-light); }
.section-prize { font-size: 22px; font-weight: 700; color: var(--green); }
.section-chevron { color: inherit; font-size: 18px; margin-left: 8px; }
.section-active .section-chevron { color: var(--green); }
.section-scheduled .section-chevron { color: var(--yellow); }
.section-completed .section-chevron { color: var(--gray); }

/* BOTTOM NAV */
.bottom-nav {
  position: fixed;
  bottom: 12px;
  left: 50%;
  transform: translateX(-50%);
  width: calc(100% - 24px);
  max-width: 456px;
  border-radius: 24px;
  background: rgba(20,18,30,.94);
  border: 1px solid rgba(255,255,255,.1);
  padding: 10px 4px 12px;
  display: flex;
  align-items: flex-end;
  justify-content: space-around;
  z-index: 50;
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
}
.nav-item {
  text-align: center;
  flex: 1;
  padding: 6px 0;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
}
.nav-item svg { transition: filter .2s; }
.nav-label { font-size: 16px; color: var(--muted); margin-top: 5px; transition: color .2s, text-shadow .2s; }
.nav-item.active svg {
  stroke: #f0f0f0;
  stroke-width: 2.2;
  filter: drop-shadow(0 0 6px rgba(240,240,240,.5)) drop-shadow(0 0 12px rgba(240,240,240,.25));
}
.nav-item.active .nav-label {
  color: #f0f0f0;
  font-weight: 700;
  text-shadow: 0 0 12px rgba(240,240,240,.6), 0 0 24px rgba(240,240,240,.3);
}
.nav-center {
  text-align: center;
  flex: 1;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
}
.nav-orb {
  width: 54px; height: 54px;
  border-radius: 50%;
  background: linear-gradient(135deg, #d4d4d4, #ffffff);
  display: flex;
  align-items: center;
  justify-content: center;
  margin: -26px auto 0;
  box-shadow: 0 4px 20px rgba(255,255,255,.3), 0 0 0 3px rgba(16,14,26,.95);
}
.nav-center .nav-label { color: #e0e0e0; font-weight: 700; }

/* Stagger animations */
@keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
.f1 { animation: fadeUp .5s .05s both; }
.f2 { animation: fadeUp .5s .12s both; }
.f3 { animation: fadeUp .5s .2s both; }
.f4 { animation: fadeUp .5s .28s both; }
.f5 { animation: fadeUp .5s .36s both; }
.f6 { animation: fadeUp .5s .44s both; }

/* Safe area padding for notch phones */
@supports (padding-bottom: env(safe-area-inset-bottom)) {
  .bottom-nav { bottom: calc(12px + env(safe-area-inset-bottom)); }
  .page { padding-bottom: calc(100px + env(safe-area-inset-bottom)); }
  .hero { padding-top: calc(48px + env(safe-area-inset-top)); }
}
</style>
</head>
<body>

<div class="page">

  <!-- HERO -->
  <div class="hero">
    <div class="logo f1">
      <span class="logo-finder">Finder</span><span class="logo-seek">Seek</span>
    </div>
    <div class="tagline f2">Hidden Treasure. Real Adventure.</div>
    <div class="f2"><span class="free-badge">FREE TO PLAY</span></div>

    <!-- CTA BUTTONS -->
    <div class="cta-row f3">
      <a class="btn-cta btn-find" href="#">
        <span class="btn-cta-icon">🔍</span>
        <span class="btn-cta-label">FIND TREASURE</span>
      </a>
      <a class="btn-cta btn-hide" href="#">
        <span class="btn-cta-icon">🏴‍☠️</span>
        <span class="btn-cta-label">HIDE TREASURE</span>
      </a>
    </div>

    <!-- STATS STRIP -->
    <div class="stats-wrap f4">
      <div class="stats-inner">
        <div class="stat">
          <span class="stat-num" style="color:#4ade80;text-shadow:0 0 12px rgba(74,222,128,.35);">$247</span>
          <span class="stat-lbl">HIDDEN</span>
        </div>
        <div class="stat">
          <span class="stat-num" style="color:#2dd4bf;">3</span>
          <span class="stat-lbl">ACTIVE</span>
        </div>
        <div class="stat">
          <span class="stat-num" style="color:#4ade80;">12</span>
          <span class="stat-lbl">SEEKERS</span>
        </div>
        <div class="stat">
          <span class="stat-num" style="color:#fff;">5</span>
          <span class="stat-lbl">CITIES</span>
        </div>
      </div>
    </div>
  </div>

  <!-- SEARCH -->
  <div class="search-row f5">
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input class="search-input" type="text" placeholder="Search quests..."/>
    </div>
    <button class="btn-livemap"><span class="pulse-dot"></span>LIVE MAP</button>
  </div>

  <!-- QUEST SECTIONS -->
  <div class="sections f6">
    <div class="section section-active" onclick="this.classList.toggle('open')">
      <div class="section-accent"></div>
      <div class="section-body">
        <div class="section-left">
          <div class="num-circle">3</div>
          <div class="section-title">ACTIVE</div>
        </div>
        <div style="display:flex;align-items:center;">
          <span class="section-prize">$172</span>
          <span class="section-chevron">▾</span>
        </div>
      </div>
    </div>

    <div class="section section-scheduled" onclick="this.classList.toggle('open')">
      <div class="section-accent"></div>
      <div class="section-body">
        <div class="section-left">
          <div class="num-circle">2</div>
          <div class="section-title">SCHEDULED</div>
        </div>
        <div style="display:flex;align-items:center;">
          <span class="section-prize">$75</span>
          <span class="section-chevron">▾</span>
        </div>
      </div>
    </div>

    <div class="section section-completed" onclick="this.classList.toggle('open')">
      <div class="section-accent"></div>
      <div class="section-body">
        <div class="section-left">
          <div class="num-circle">8</div>
          <div class="section-title">COMPLETED</div>
        </div>
        <div style="display:flex;align-items:center;">
          <span class="section-prize">$430</span>
          <span class="section-chevron">▾</span>
        </div>
      </div>
    </div>
  </div>

</div>

<!-- BOTTOM NAV -->
<nav class="bottom-nav">
  <div class="nav-item active" onclick="setNav(this)">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
    <div class="nav-label">Home</div>
  </div>
  <div class="nav-item" onclick="setNav(this)">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>
    <div class="nav-label">How</div>
  </div>
  <div class="nav-center" onclick="setNav(this)">
    <div class="nav-orb">
      <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="#1a1a1a" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    </div>
    <div class="nav-label">Quests</div>
  </div>
  <div class="nav-item" onclick="setNav(this)">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="20" height="14" rx="2" ry="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
    <div class="nav-label">Pricing</div>
  </div>
  <div class="nav-item" onclick="setNav(this)">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
    <div class="nav-label">Profile</div>
  </div>
</nav>

<script>
function setNav(el) {
  document.querySelectorAll('.nav-item, .nav-center').forEach(function(n) {
    n.classList.remove('active');
  });
  el.classList.add('active');
}
</script>

</body>
</html>
